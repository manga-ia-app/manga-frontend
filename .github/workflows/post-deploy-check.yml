name: Post-deploy check

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: post-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write  # required so auto-rollback can push a revert commit

env:
  # Phase 2 (armed): smoke failures trigger a git-revert-based rollback.
  ROLLBACK_ENABLED: "true"
  FRONTEND_URL: "https://manga-frontend-smoky.vercel.app"

jobs:
  smoke-and-rollback:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so `git revert` can walk back

      - name: Wait for Vercel deploy to become reachable
        run: |
          # Hitting /login directly: / redirects to /login (307) for anonymous
          # users (middleware auth gate), so /login is our public canary.
          # Vercel deploys are fast and self-healing, so we don't need the
          # heavier provider-API polling that Koyeb/Render need.
          max_wait=300
          interval=10
          elapsed=0
          until curl -fsS --max-time 10 "${FRONTEND_URL}/login" > /dev/null; do
            if [ $elapsed -ge $max_wait ]; then
              echo "::error::Vercel deploy not reachable after ${max_wait}s"
              exit 1
            fi
            sleep $interval
            elapsed=$((elapsed + interval))
            echo "waiting... ${elapsed}s"
          done
          echo "deploy reachable after ${elapsed}s"

      - name: Warmup — /login consistently responsive
        run: |
          # Require 3 consecutive 200s to avoid racing the end of a rollout.
          success=0
          for i in $(seq 1 10); do
            status=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 "${FRONTEND_URL}/login" || echo "000")
            if [ "$status" = "200" ]; then
              success=$((success + 1))
              if [ $success -ge 3 ]; then
                echo "warmup OK after $i attempt(s)"
                exit 0
              fi
            else
              success=0
              echo "warmup attempt $i: $status"
            fi
            sleep 2
          done
          echo "::error::Warmup failed — /login not consistently 200"
          exit 1

      - name: Smoke — /login renders Manga title
        run: |
          status=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 "${FRONTEND_URL}/login")
          if [ "$status" != "200" ]; then
            echo "::error::/login returned $status"
            exit 1
          fi
          body=$(curl -fsS --max-time 15 "${FRONTEND_URL}/login")
          if ! echo "$body" | grep -q '<title>Manga</title>'; then
            echo "::error::/login HTML missing <title>Manga</title> — layout render likely broken"
            exit 1
          fi

      - name: Smoke — / redirects unauthenticated users to /login
        run: |
          # Proves the middleware auth gate is still alive. If / ever returns
          # 200 for an anonymous request, the middleware broke (real issue).
          status=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 "${FRONTEND_URL}/")
          case "$status" in
            301|302|307|308) echo "redirect OK ($status)" ;;
            *) echo "::error::/ returned $status (expected 3xx redirect — middleware may be broken)"; exit 1 ;;
          esac

      - name: Auto-rollback on failure (git revert + push)
        if: failure() && env.ROLLBACK_ENABLED == 'true'
        env:
          HEAD_MSG: ${{ github.event.head_commit.message }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          if [[ "$HEAD_MSG" == revert\(auto-rollback\):* ]]; then
            echo "::error::Auto-rollback already applied and smoke is still failing."
            echo "::error::Manual intervention required — revert of revert won't fix this."
            exit 1
          fi

          git config user.name "manga-auto-rollback[bot]"
          git config user.email "manga-auto-rollback@users.noreply.github.com"

          ORIG_SUBJECT=$(git log -1 --format=%s HEAD)
          ORIG_SHA=$(git rev-parse --short HEAD)

          git revert HEAD --no-edit --mainline 1 2>/dev/null || git revert HEAD --no-edit

          git commit --amend -m "revert(auto-rollback): smoke failed on ${ORIG_SHA}

Original: ${ORIG_SUBJECT}

Auto-reverted by post-deploy smoke test.
Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          git push origin HEAD:main
          echo "rolled back ${ORIG_SHA} — Vercel will redeploy the reverted code"
